name: bantaydrive
description: "A Driving Monitoring System."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Charts
  fl_chart: ^1.1.1

  # Camera
  camera: ^0.12.0

  # Permissions
  permission_handler: ^12.0.1

  # State management
  flutter_riverpod: ^3.2.1

  # Audio
  audioplayers: ^6.0.0
  volume_controller: ^3.4.3

  # Storage / Prefs
  shared_preferences: ^2.3.0
  path_provider: ^2.1.2

  # ML inference (BiLSTM + Attention — Android)
  tflite_flutter: ^0.12.1

  # Notifications / Background
  flutter_local_notifications: ^21.0.0
  flutter_foreground_task: ^9.0.1

  # Device info
  device_info_plus: ^13.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/car.png
    - assets/text_logo.png
    - assets/L1_L2_sound.mp3
    - assets/L3_critical_alert.wav
    - assets/bantay_drive_logo.png
    - assets/models/t01_spatial_float16.tflite
    - assets/models/t02_temporal_float16.tflite
    - assets/config/fusion_config.json