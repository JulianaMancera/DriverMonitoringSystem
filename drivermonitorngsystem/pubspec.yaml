name: bantaydrive
description: "A Driver Monitoring System — Bantay Drive"
publish_to: "none"
version: 1.0.0+1

environment:
  # FIX: ^3.10.4 referenced a non-existent SDK version.
  # Using >=3.3.0 <4.0.0 — Flutter 3.16+ ships with Dart 3.3.x
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Charts
  fl_chart: ^1.2.0

  # Camera
  camera: ^0.12.0+1

  # Permissions
  permission_handler: ^12.0.1

  # State management
  flutter_riverpod: ^3.3.1

  # Audio
  audioplayers: ^6.0.0
  volume_controller: ^3.4.4

  # Storage / Prefs
  shared_preferences: ^2.3.0
  path_provider: ^2.1.2

  # ML inference (TFLite — Android)
  tflite_flutter: ^0.12.1

  # Notifications / Background
  flutter_local_notifications: ^21.0.0
  flutter_foreground_task: ^9.2.2

  # Device info
  device_info_plus: ^13.0.0
  url_launcher: ^6.3.0

  # App version in settings/about
  package_info_plus: ^10.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/car.png
    - assets/text_logo.png
    - assets/L1_L2_sound.mp3
    - assets/L3_critical_alert.wav
    - assets/bantay_drive_logo.png
    - assets/models/dms_hybridnet_v3_float32.tflite